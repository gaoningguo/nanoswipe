name: Release NanoSwipe-Omni

on:
  push:
    tags:
      - 'omni-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. omni-v0.1.0)'
        required: true

permissions:
  contents: write

defaults:
  run:
    working-directory: NanoSwipe-Omni

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        working-directory: .
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  web:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: NanoSwipe-Omni/package-lock.json
      - run: npm ci
      - run: npm run build:web
      - name: Package web bundle
        run: |
          cd apps/web/dist
          zip -qr "../../../nanoswipe-web-${{ needs.prepare.outputs.tag }}.zip" .
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: NanoSwipe Omni ${{ needs.prepare.outputs.tag }}
          files: NanoSwipe-Omni/nanoswipe-web-*.zip
          fail_on_unmatched_files: true

  tauri:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            artifact_glob: |
              NanoSwipe-Omni/apps/tauri/src-tauri/target/release/bundle/msi/*.msi
              NanoSwipe-Omni/apps/tauri/src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-latest
            label: macos
            artifact_glob: |
              NanoSwipe-Omni/apps/tauri/src-tauri/target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            label: linux
            artifact_glob: |
              NanoSwipe-Omni/apps/tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              NanoSwipe-Omni/apps/tauri/src-tauri/target/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: NanoSwipe-Omni/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: NanoSwipe-Omni/apps/tauri/src-tauri -> target

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup2.4-dev \
            patchelf

      - run: npm ci
      - run: npm run build:web

      - name: Generate full icon set (macOS / Linux)
        if: matrix.os != 'windows-latest'
        working-directory: NanoSwipe-Omni/apps/tauri/src-tauri
        run: |
          npx --yes @tauri-apps/cli@^1 icon icons/icon.png || echo "icon generation skipped"

      - name: Build Tauri bundle
        working-directory: NanoSwipe-Omni/apps/tauri
        run: |
          npx --yes @tauri-apps/cli@^1 build

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: NanoSwipe Omni ${{ needs.prepare.outputs.tag }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: false

  android:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: NanoSwipe-Omni/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - run: npm ci
      - run: npm run build:web

      - name: Add Android platform
        working-directory: NanoSwipe-Omni/apps/capacitor
        run: |
          if [ ! -d android ]; then
            npx --yes cap add android
          fi
          npx --yes cap sync android

      - name: Build debug APK
        working-directory: NanoSwipe-Omni/apps/capacitor/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        working-directory: .
        run: |
          mkdir -p out
          cp NanoSwipe-Omni/apps/capacitor/android/app/build/outputs/apk/debug/app-debug.apk \
             "out/nanoswipe-android-${{ needs.prepare.outputs.tag }}.apk"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: NanoSwipe Omni ${{ needs.prepare.outputs.tag }}
          files: out/nanoswipe-android-*.apk
          fail_on_unmatched_files: true

  ios-unsigned:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: NanoSwipe-Omni/package-lock.json

      - run: npm ci
      - run: npm run build:web

      - name: Add iOS platform
        working-directory: NanoSwipe-Omni/apps/capacitor
        run: |
          if [ ! -d ios ]; then
            npx --yes cap add ios
          fi
          npx --yes cap sync ios

      - name: Pod install
        working-directory: NanoSwipe-Omni/apps/capacitor/ios/App
        run: pod install --repo-update

      - name: Archive (unsigned)
        working-directory: NanoSwipe-Omni/apps/capacitor/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package unsigned IPA
        working-directory: NanoSwipe-Omni/apps/capacitor/ios/App
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -qr "../../../../../nanoswipe-ios-unsigned-${{ needs.prepare.outputs.tag }}.ipa" Payload

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: NanoSwipe Omni ${{ needs.prepare.outputs.tag }}
          files: NanoSwipe-Omni/nanoswipe-ios-unsigned-*.ipa
          fail_on_unmatched_files: true
          body: |
            ## 下载说明

            - **Web**：解压 `nanoswipe-web-*.zip` 后部署到任意静态服务器或 CDN。
            - **Windows**：`*.msi` 或 `*.exe`（未做代码签名，首次运行 SmartScreen 会提示「更多信息 → 仍要运行」）。
            - **macOS**：`*.dmg`（未做公证，首次打开请右键 → 打开，或在「系统设置 → 隐私与安全」中允许）。
            - **Linux**：`*.AppImage`（赋予可执行权限后直接运行）或 `*.deb`（`sudo dpkg -i`）。
            - **Android**：`*.apk`，debug 签名，可直接侧载安装。
            - **iOS（未签名）**：`*.ipa` **不能直接拖到手机安装**。需要使用 [Sideloadly](https://sideloadly.io/) 或 [AltStore](https://altstore.io/) 配合你自己的 Apple ID 重签后侧载，重签后有效期 7 天，到期需重新签名。
